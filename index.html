<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="manifest" href="/manifest.json" />
  <title>Terminal</title>
  <script>
    // Store token from URL if present
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (token) {
      sessionStorage.setItem('tunnel-token', token);
      // Clean URL
      window.history.replaceState({}, document.title, '/');
    }
    // High Fix #11: Improved fetch override - read token from sessionStorage on each request
    // The original monkey-patch was permanent and couldn't be undone without reload
    (() => {
      // Don't override fetch in development where we're using relative URLs
      // The backend handles auth via cookies in that case
      if (window.location.hostname === 'localhost') {
        // Still set cookie for development
        const storedToken = sessionStorage.getItem('tunnel-token');
        if (storedToken) {
          document.cookie = `tunnel_token=${storedToken}; path=/; SameSite=Strict`;
        }
        return;
      }
      const originalFetch = window.fetch.bind(window);
      window.fetch = function(url, options = {}) {
        // Read current token from sessionStorage on each fetch (not cached)
        const currentToken = sessionStorage.getItem('tunnel-token');
        if (currentToken) {
          // Set cookie as well
          document.cookie = `tunnel_token=${currentToken}; path=/; SameSite=Strict`;
          // For relative URLs, add the header
          if (typeof url === 'string' && !url.startsWith('http')) {
            return originalFetch(url, {
              ...options,
              credentials: 'include',
              headers: { ...options.headers, 'x-tunnel-token': currentToken }
            });
          }
        }
        return originalFetch(url, options);
      };
    })();
    // Service worker - register unconditionally for PWA support (Medium Fix #15)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => {
        console.warn('Service worker registration failed:', err);
      });
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
