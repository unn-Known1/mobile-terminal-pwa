name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.0.0)'
        required: true
        type: string

jobs:
  # Build for Linux (Debian/Ubuntu)
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxss1 libglib2.0-0 libnss3 libasound2 libgbm1

      - name: Build frontend
        run: npm run build

      - name: Build Linux package
        run: npm run build:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: release/*.deb
          retention-days: 5

  # Build for Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Windows package
        run: npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: release/*.exe
          retention-days: 5

  # Build for macOS
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build macOS package
        run: npm run build:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: release/*.dmg
          retention-days: 5

  # Create GitHub Release
  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-packages/*.deb
            artifacts/windows-packages/*.exe
            artifacts/macos-packages/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Verify build integrity
  verify-build:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Verify Linux package exists
        run: |
          echo "=== Checking Linux packages ==="
          ls -la artifacts/linux-packages/ || echo "No Linux packages found"

      - name: Verify Windows package exists
        run: |
          echo "=== Checking Windows packages ==="
          ls -la artifacts/windows-packages/ || echo "No Windows packages found"

      - name: Verify macOS package exists
        run: |
          echo "=== Checking macOS packages ==="
          ls -la artifacts/macos-packages/ || echo "No macOS packages found"

      - name: List all release artifacts
        run: |
          echo "=== All Release Artifacts ==="
          find artifacts -type f \( -name "*.deb" -o -name "*.exe" -o -name "*.dmg" \) 2>/dev/null | while read f; do
            echo "  $f ($(du -h "$f" | cut -f1))"
          done